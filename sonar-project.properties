sonar.projectKey=python-toolkit
sonar.projectName=Python Toolkit
sonar.projectVersion=0.1.0

sonar.sources=app
sonar.tests=tests
sonar.python.version=3.11

# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,**/*.pyc,**/migrations/**

# Duplications: exclude test files and __init__.py
sonar.cpd.exclusions=tests/**,**/__init__.py
